---
# Default values for the restaurant application
# These values can be overridden per environment

app:
  name: tonkatsu-injeong
  version: "1.0.0"

image:
  repository: php
  tag: "8.2-fpm"
  pullPolicy: IfNotPresent

replicaCount: 2

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: tonkatsuij.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tonkatsuij-tls
      hosts:
        - tonkatsuij.com

