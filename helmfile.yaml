---
# Helmfile configuration for Tonkatsu Injeong Restaurant Website
# This file defines how to deploy the application to Kubernetes

repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: nginx-stable
    url: https://kubernetes.github.io/ingress-nginx

releases:
  # PHP-FPM Application
  - name: restaurant-app
    namespace: default
    chart: bitnami/php-fpm
    version: 0.1.0
    values:
      - image:
          registry: docker.io
          repository: php
          tag: "8.2-fpm"
        replicaCount: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        persistence:
          enabled: true
          size: 10Gi
          storageClass: ""
        service:
          type: ClusterIP
          port: 9000

  # Nginx Web Server
  - name: restaurant-nginx
    namespace: default
    chart: bitnami/nginx
    version: 15.1.0
    values:
      - replicaCount: 2
        image:
          registry: docker.io
          repository: nginx
          tag: "alpine"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        service:
          type: LoadBalancer
          port: 80
        ingress:
          enabled: true
          hostname: tonkatsuij.com
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
          tls: true
        nginxConfig:
          customConfig: |
            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }
            location ~ \.php$ {
                fastcgi_pass restaurant-app-php-fpm:9000;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                include fastcgi_params;
            }

environments:
  default:
    values:
      - imageTag: "latest"
      - domain: "tonkatsuij.com"
  
  production:
    values:
      - imageTag: "v1.0.0"
      - domain: "tonkatsuij.com"
      - replicaCount: 3
  
  staging:
    values:
      - imageTag: "dev"
      - domain: "staging.tonkatsuij.com"
      - replicaCount: 1

