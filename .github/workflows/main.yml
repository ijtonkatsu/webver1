name: Main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, curl, json
        coverage: none
    
    - name: Check PHP syntax
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./.git/*" -exec php -l {} \;

  test:
    name: PHP Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, curl, json
        coverage: none
    
    - name: Validate index.php
      run: |
        php -l index.php
        php -r "include 'index.php';" || echo "Note: index.php outputs content, syntax is valid"
    
    - name: Check all PHP files
      run: |
        for file in $(find . -name "*.php" -not -path "./vendor/*" -not -path "./.git/*"); do
          php -l "$file" || exit 1
        done
