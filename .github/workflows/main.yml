name: Main

on:
  push:
    branches: [ main ]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install
      uses: CultureHQ/actions-bundler@master
      with:
        args: install

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      uses: CultureHQ/actions-bundler@master
      with:
        args: install
    
    - name: Lint
      uses: CultureHQ/actions-bundler@master
      with:
        args: exec rubocop

  test:
    runs-on: ubuntu-latest
    needs: install
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      uses: CultureHQ/actions-bundler@master
      with:
        args: install
    
    - name: Test
      uses: CultureHQ/actions-bundler@master
      with:
        args: exec rake

